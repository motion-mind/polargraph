; Polargraph firmware for Fysetc E4 (ESP32)
; Flash with:  pio run --target upload
; Flash FS:    pio run --target uploadfs   (uploads data/ to LittleFS)

[env:fysetc_e4]
platform      = espressif32
board         = esp32dev
framework     = arduino

; Serial monitor
monitor_speed = 250000
monitor_filters = esp32_exception_decoder

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1
    -std=gnu++17
    -Iinclude

; Library dependencies
lib_deps =
    teemuatlut/TMCStepper @ ^0.7.3
    madhephaestus/ESP32Servo @ ^0.13.0
    ayushsharma82/ElegantOTA @ ^3.1.0

; Partition scheme — 4MB flash: 1.5MB app + 1.5MB OTA + 1MB LittleFS
board_build.partitions  = min_spiffs.csv
board_build.filesystem  = littlefs

; Data directory for LittleFS (image_processor.html lives here)
data_dir = data
